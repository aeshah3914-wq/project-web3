<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <title>The Vitality Nexus | Team Pulse</title>
    <link rel="stylesheet" href="fitpulse.css">
</head>
<body id="teamBody">

    <nav class="nexus-navbar">
        <div class="nexus-logo-container">
            <img src="logo-girl.png" alt="Logo" style="width: 32px; height: 32px; object-fit: contain;">
            <span>The Vitality Nexus</span>
        </div>
        <div class="nexus-nav-links">
            <a href="micro-break.html" class="nexus-nav-link">Micro Break</a>
            <a href="mood-interface.html" class="nexus-nav-link">Mood Interface</a>
            <a href="progress-tracker.html" class="nexus-nav-link">Progress Tracker</a>
            <a href="team-pulse.html" class="nexus-nav-link active">Team Pulse</a>
        </div>
    </nav>

    <div class="nexus-container">
        <section class="nexus-soft-card">
            <h2 class="nexus-text-center" style="font-weight: 700; font-size: 20px; color: var(--accent-maroon); margin-bottom: 5px;">Team Workspace Status</h2>
            <p class="nexus-text-center" style="color: #8A6F73; font-size: 13px; margin-bottom: 25px;">Updates from active members in the workspace.</p>
            
            <div class="team-grid">
                <div class="team-member-card">
                    <strong style="color: var(--accent-maroon); font-size: 14px;">Sarah Jenkins</strong>
                    <span style="font-size: 12px; color: #8A6F73;">UI Design Lead</span>
                </div>
                <div class="team-member-card">
                    <strong style="color: var(--accent-maroon); font-size: 14px;">Elena Rostova</strong>
                    <span style="font-size: 12px; color: #8A6F73;">System Architect</span>
                </div>
                <div class="team-member-card">
                    <strong style="color: var(--accent-maroon); font-size: 14px;">Amira Tariq</strong>
                    <span style="font-size: 12px; color: #8A6F73;">Full-Stack Engineer</span>
                </div>
            </div>
        </section>
    </div>

    <div class="nexus-production-tag">Produced in 2026 ©</div>

    <script>
        window.onload = function() {
            const activeMood = localStorage.getItem('nexusUserMood') || 'calm';
            document.getElementById('teamBody').className = "mood-" + activeMood;
        }
    </script>
</body>
</html>
