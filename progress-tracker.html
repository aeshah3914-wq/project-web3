<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <title>The Vitality Nexus | Progress Tracker</title>
    <link rel="stylesheet" href="fitpulse.css">
</head>
<body id="trackerBody">

    <nav class="nexus-navbar">
        <div class="nexus-logo-container">
            <img src="logo-girl.png" alt="Logo" style="width: 32px; height: 32px; object-fit: contain;">
            <span>The Vitality Nexus</span>
        </div>
        <div class="nexus-nav-links">
            <a href="micro-break.html" class="nexus-nav-link">Micro Break</a>
            <a href="mood-interface.html" class="nexus-nav-link">Mood Interface</a>
            <a href="progress-tracker.html" class="nexus-nav-link active">Progress Tracker</a>
            <a href="team-pulse.html" class="nexus-nav-link">Team Pulse</a>
        </div>
    </nav>

    <div class="nexus-container">
        <section class="nexus-soft-card nexus-text-center">
            <h2 style="font-weight: 700; font-size: 20px; color: var(--accent-maroon); margin-bottom: 5px;">Your Progress</h2>
            <p style="color: #8A6F73; font-size: 13px; margin-bottom: 25px;">Track your finished exercises and goals today.</p>
            
            <div style="text-align: left; margin-bottom: 20px;">
                <span style="font-weight: 600; font-size: 13px; color: var(--accent-maroon);">Daily Goal Completion</span>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="goalProgressFill"></div>
                </div>
                <span style="font-size: 12px; color: #8A6F73;" id="progressPercentageText">0% Complete</span>
            </div>
            <button class="nexus-real-button" onclick="boostProgressSimulation()">Simulate Progress</button>
        </section>
    </div>

    <div class="nexus-production-tag">Produced in 2026 ©</div>

    <script>
        let currentProgress = 40;
        function updateProgressBarVisuals() {
            const fill = document.getElementById('goalProgressFill');
            const txt = document.getElementById('progressPercentageText');
            if(fill && txt) { fill.style.width = currentProgress + '%'; txt.innerText = currentProgress + '% Complete'; }
        }
        function boostProgressSimulation() {
            if(currentProgress < 100) { currentProgress += 20; if(currentProgress > 100) currentProgress = 100; updateProgressBarVisuals(); }
        }
        window.onload = function() {
            const activeMood = localStorage.getItem('nexusUserMood') || 'calm';
            document.getElementById('trackerBody').className = "mood-" + activeMood;
            updateProgressBarVisuals();
        }
    </script>
</body>
</html>
